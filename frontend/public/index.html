<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="TimeBank - The Digital Horizon. Exchange skills and time."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>TimeBank | The Digital Horizon</title>
    <style>
  
      body, html {
        overflow-x: hidden !important;
        max-width: 100vw !important;
      }
      
      * { box-sizing: border-box !important; }

      .mobile-schedule-toggle {
        display: none !important;
      }

      @media screen and (max-width: 768px) {
        
        .mobile-schedule-toggle {
          display: block !important;
          width: 100% !important;
          padding: 1rem !important;
          background-color: #8b5cf6 !important;
          color: white !important;
          border: none !important;
          border-radius: 8px !important;
          font-weight: bold !important;
          margin-bottom: 1rem !important;
          cursor: pointer !important;
          order: 1 !important; 
        }

        .right-sidebar { 
          display: none !important; 
          border-left: none !important; 
          padding: 1rem 0 !important; 
          margin-top: 1rem !important; 
          width: 100% !important; 
          order: 2 !important; 
        }

        .right-sidebar.show-mobile {
          display: block !important; 
        }

        .dashboard-layout {
          display: flex !important;
          flex-direction: column !important; 
          width: 100% !important;
        }

        .center-feed {
          order: 3 !important; 
          width: 100% !important;
          max-width: 100vw !important;
          padding-left: 1rem !important;
          padding-right: 1rem !important;
          overflow-x: hidden !important;
        }

        .app-container, .profile-container, .view-profile-container {
          flex-direction: column !important;
          padding-bottom: 85px !important;
          height: auto !important;
          display: flex !important;
          width: 100vw !important;
          overflow-x: hidden !important;
        }
        
        .main-content {
          width: 100% !important;
          max-width: 100vw !important;
          padding-left: 1rem !important;
          padding-right: 1rem !important;
          overflow-x: hidden !important;
        }

        .left-sidebar {
          position: fixed !important;
          top: auto !important;
          bottom: 0 !important;
          left: 0 !important;
          width: 100vw !important;
          height: 75px !important;
          display: flex !important;
          flex-direction: row !important;
          justify-content: center !important; 
          align-items: center !important;
          padding: 0 1rem !important;
          gap: 1rem !important; 
          z-index: 999999 !important;
          border-right: none !important;
          border-top: 1px solid #e2e8f0 !important; 
          background-color: #ffffff !important; 
          overflow-x: auto !important; 
          white-space: nowrap !important;
          -webkit-overflow-scrolling: touch !important;
        }
        
        .left-sidebar::-webkit-scrollbar { display: none !important; }
        .left-sidebar .brand-logo { display: none !important; }
       
        .left-sidebar .nav-menu {
          display: contents !important; 
        }

        .left-sidebar .nav-item {
          font-size: 0.85rem !important;
          font-weight: 600 !important;
          padding: 0.6rem 0.5rem !important;
          border-radius: 8px !important;
          display: inline-block !important; 
          flex-shrink: 0 !important; 
        }

        .top-nav {
          flex-direction: row !important; 
          align-items: center !important;
          justify-content: space-between !important;
          width: 100% !important;
          padding: 1rem 0 !important; 
        }
        
        .top-links {
          width: auto !important;
          flex-grow: 1 !important; 
          overflow-x: auto !important; 
          padding-bottom: 0 !important;
          margin-right: 1rem !important; 
          white-space: nowrap !important; 
        }
        .top-links::-webkit-scrollbar { display: none !important; }
        
        .user-controls {
          width: auto !important; 
          justify-content: flex-end !important;
          flex-shrink: 0 !important; 
          display: flex !important;
          flex-direction: row !important;
          align-items: center !important;
          gap: 0.5rem !important;
        }

        .search-bar, .search-bar input {
          width: 100% !important;
          max-width: 100% !important;
        }
        .teacher-grid { grid-template-columns: 1fr !important; width: 100% !important; }
        .ledger-container { overflow-x: auto !important; white-space: nowrap !important; }
      }
    </style>
  </head>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
